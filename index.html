<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebRTC Signaling Flow Visualizer</title>
<meta name="description" content="Interactive WebRTC connection flow visualizer. SDP Offer/Answer, ICE candidates, STUN/TURN servers, Trickle ICE, connection states. Step-through signaling sequence diagrams.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
header{padding:12px 20px;background:#111128;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:1.1rem;color:#4dabf7}
.controls{display:flex;gap:8px;align-items:center;margin-left:auto}
.controls button{padding:6px 14px;border:1px solid #3a3a6a;border-radius:6px;background:#1a1a3a;color:#e0e0e0;cursor:pointer;font-size:.85rem}
.controls button:hover{background:#2a2a5a}
.controls button.primary{background:#228be6;border-color:#339af0;color:#fff}
select{padding:6px 10px;border:1px solid #3a3a6a;border-radius:6px;background:#1a1a3a;color:#e0e0e0;font-size:.85rem}
.main{display:flex;flex:1;overflow:hidden}
.seq-col{flex:1;overflow:auto;padding:16px 8px}
.sidebar{width:340px;border-left:1px solid #2a2a4a;display:flex;flex-direction:column;overflow:auto}
.tab-bar{display:flex;border-bottom:1px solid #2a2a4a}
.tab-bar button{flex:1;padding:8px;background:none;border:none;color:#888;cursor:pointer;font-size:.8rem;border-bottom:2px solid transparent}
.tab-bar button.active{color:#4dabf7;border-bottom-color:#4dabf7}
.tab-content{flex:1;overflow:auto;padding:12px}
/* Sequence diagram */
.seq-diagram{position:relative;min-width:700px}
.seq-entities{display:flex;justify-content:space-between;padding:0 20px;margin-bottom:8px}
.entity{text-align:center;width:140px}
.entity-box{padding:8px 16px;border-radius:8px;font-size:.8rem;font-weight:600;border:2px solid}
.entity-peer-a{border-color:#4dabf7;color:#4dabf7;background:rgba(77,171,247,.1)}
.entity-signal{border-color:#ffd43b;color:#ffd43b;background:rgba(255,212,59,.1)}
.entity-stun{border-color:#69db7c;color:#69db7c;background:rgba(105,219,124,.1)}
.entity-peer-b{border-color:#f783ac;color:#f783ac;background:rgba(247,131,172,.1)}
.entity-turn{border-color:#ff6b6b;color:#ff6b6b;background:rgba(255,107,107,.1)}
.lifeline{position:absolute;width:2px;background:#2a2a4a;top:50px}
.seq-steps{position:relative;padding-top:8px}
.seq-step{position:relative;height:48px;display:flex;align-items:center;opacity:.2;transition:all .4s}
.seq-step.active{opacity:1}
.seq-step.past{opacity:.6}
.arrow{position:absolute;height:2px;display:flex;align-items:center}
.arrow-line{flex:1;height:2px;position:relative}
.arrow-head{width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;position:absolute}
.arrow-right .arrow-head{border-left:8px solid;right:-8px}
.arrow-left .arrow-head{border-right:8px solid;left:-8px}
.arrow-label{position:absolute;top:-18px;white-space:nowrap;font-size:.72rem;font-weight:600;padding:2px 6px;border-radius:4px}
.arrow-sdp .arrow-line{background:#ffd43b}.arrow-sdp .arrow-head{border-left-color:#ffd43b;border-right-color:#ffd43b}.arrow-sdp .arrow-label{color:#ffd43b;background:rgba(255,212,59,.1)}
.arrow-ice .arrow-line{background:#69db7c}.arrow-ice .arrow-head{border-left-color:#69db7c;border-right-color:#69db7c}.arrow-ice .arrow-label{color:#69db7c;background:rgba(105,219,124,.1)}
.arrow-stun .arrow-line{background:#4dabf7}.arrow-stun .arrow-head{border-left-color:#4dabf7;border-right-color:#4dabf7}.arrow-stun .arrow-label{color:#4dabf7;background:rgba(77,171,247,.1)}
.arrow-media .arrow-line{background:#cc5de8}.arrow-media .arrow-head{border-left-color:#cc5de8;border-right-color:#cc5de8}.arrow-media .arrow-label{color:#cc5de8;background:rgba(204,93,232,.1)}
.arrow-turn .arrow-line{background:#ff6b6b}.arrow-turn .arrow-head{border-left-color:#ff6b6b;border-right-color:#ff6b6b}.arrow-turn .arrow-label{color:#ff6b6b;background:rgba(255,107,107,.1)}
.arrow-fail .arrow-line{background:#ff4444;border-top:2px dashed #ff4444;height:0}.arrow-fail .arrow-head{border-left-color:#ff4444;border-right-color:#ff4444}.arrow-fail .arrow-label{color:#ff4444;background:rgba(255,68,68,.1)}
.state-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.st-new{background:rgba(100,100,255,.2);color:#8888ff}
.st-connecting{background:rgba(255,169,77,.2);color:#ffa94d}
.st-connected{background:rgba(105,219,124,.2);color:#69db7c}
.st-failed{background:rgba(255,68,68,.2);color:#ff6b6b}
.st-closed{background:rgba(100,100,100,.2);color:#888}
.info-card{background:#0d0d20;border:1px solid #2a2a4a;border-radius:6px;padding:10px;margin-bottom:8px}
.info-card h4{font-size:.8rem;margin-bottom:6px}
.info-card p{font-size:.75rem;line-height:1.5;color:#aaa}
.sdp-block{background:#0d0d20;border:1px solid #2a2a4a;border-radius:6px;padding:8px;font-family:monospace;font-size:.7rem;line-height:1.5;overflow-x:auto;white-space:pre;color:#ffd43b;max-height:200px;overflow-y:auto}
.ref-table{width:100%;border-collapse:collapse;font-size:.75rem}
.ref-table th{text-align:left;padding:6px 8px;border-bottom:1px solid #2a2a4a;color:#4dabf7}
.ref-table td{padding:6px 8px;border-bottom:1px solid #1a1a3a}
@media(max-width:900px){.main{flex-direction:column}.sidebar{width:100%;max-height:40vh;border-left:none;border-top:1px solid #2a2a4a}}
</style>
</head>
<body>
<header>
<h1>WebRTC Signaling Flow</h1>
<select id="scenarioSelect"></select>
<div class="controls">
<button onclick="stepBack()">← Back</button>
<button onclick="stepForward()" class="primary">Step →</button>
<button onclick="autoPlay()">▶ Auto</button>
<button onclick="reset()">Reset</button>
</div>
</header>
<div class="main">
<div class="seq-col" id="seqCol"></div>
<div class="sidebar">
<div class="tab-bar">
<button class="active" onclick="switchTab('detail')">Details</button>
<button onclick="switchTab('sdp')">SDP</button>
<button onclick="switchTab('reference')">Reference</button>
</div>
<div class="tab-content" id="tabContent"></div>
</div>
</div>
<script>
const SCENARIOS=[
{name:'Basic P2P (STUN)',
 entities:['Peer A','Signaling\nServer','STUN\nServer','Peer B'],
 entityClasses:['entity-peer-a','entity-signal','entity-stun','entity-peer-b'],
 steps:[
  {from:0,to:0,type:'sdp',label:'createOffer()',desc:'Peer A creates RTCPeerConnection and calls createOffer(). This generates an SDP (Session Description Protocol) message describing A\'s media capabilities: codecs, ICE credentials, fingerprints.',state:{a:'new',b:'new'}},
  {from:0,to:0,type:'sdp',label:'setLocalDescription(offer)',desc:'Peer A sets the offer as its local description. This triggers ICE candidate gathering — the browser starts discovering its network addresses (host, server-reflexive, relay).',state:{a:'have-local-offer',b:'new'}},
  {from:0,to:1,type:'sdp',label:'Send SDP Offer',desc:'The SDP offer is sent to Peer B via the signaling server. WebRTC does NOT define the signaling protocol — you can use WebSocket, HTTP, or even carrier pigeon.',state:{a:'have-local-offer',b:'new'}},
  {from:1,to:3,type:'sdp',label:'Forward SDP Offer',desc:'The signaling server forwards the SDP offer to Peer B. The server is just a relay — it doesn\'t process or modify the SDP.',state:{a:'have-local-offer',b:'new'}},
  {from:3,to:3,type:'sdp',label:'setRemoteDescription(offer)',desc:'Peer B receives the offer and sets it as remote description. Now B knows A\'s capabilities and can create a compatible answer.',state:{a:'have-local-offer',b:'have-remote-offer'}},
  {from:3,to:3,type:'sdp',label:'createAnswer()',desc:'Peer B creates an SDP answer with its own capabilities. The answer selects compatible codecs and parameters from A\'s offer.',state:{a:'have-local-offer',b:'have-remote-offer'}},
  {from:3,to:3,type:'sdp',label:'setLocalDescription(answer)',desc:'Peer B sets the answer as local description. ICE gathering also starts on B\'s side.',state:{a:'have-local-offer',b:'stable'}},
  {from:3,to:1,type:'sdp',label:'Send SDP Answer',desc:'The SDP answer is sent back through the signaling server.',state:{a:'have-local-offer',b:'stable'}},
  {from:1,to:0,type:'sdp',label:'Forward SDP Answer',desc:'Signaling server forwards the answer to Peer A.',state:{a:'have-local-offer',b:'stable'}},
  {from:0,to:0,type:'sdp',label:'setRemoteDescription(answer)',desc:'Peer A sets the answer as remote description. Both peers now have local and remote descriptions. SDP exchange complete!',state:{a:'stable',b:'stable'}},
  {from:0,to:2,type:'stun',label:'STUN Binding Request',desc:'Peer A sends a STUN Binding Request to discover its public IP and port (server-reflexive candidate). NAT traversal begins.',state:{a:'stable',b:'stable'}},
  {from:2,to:0,type:'stun',label:'STUN Binding Response (srflx)',desc:'STUN server responds with A\'s public IP:port as seen from the internet. This is a server-reflexive (srflx) ICE candidate.',state:{a:'stable',b:'stable'}},
  {from:0,to:1,type:'ice',label:'ICE Candidate (host + srflx)',desc:'Peer A sends discovered ICE candidates to B via signaling. Trickle ICE: candidates are sent as they\'re discovered, not all at once.',state:{a:'stable',b:'stable'}},
  {from:1,to:3,type:'ice',label:'Forward ICE Candidates',desc:'Signaling server relays A\'s ICE candidates to B.',state:{a:'stable',b:'stable'}},
  {from:3,to:2,type:'stun',label:'STUN Binding Request',desc:'Peer B also performs STUN lookup to discover its own public address.',state:{a:'stable',b:'stable'}},
  {from:2,to:3,type:'stun',label:'STUN Binding Response (srflx)',desc:'B gets its server-reflexive candidate.',state:{a:'stable',b:'stable'}},
  {from:3,to:1,type:'ice',label:'ICE Candidate (host + srflx)',desc:'B sends its ICE candidates back to A.',state:{a:'stable',b:'stable'}},
  {from:1,to:0,type:'ice',label:'Forward ICE Candidates',desc:'A receives B\'s candidates.',state:{a:'stable',b:'stable'}},
  {from:0,to:3,type:'stun',label:'STUN Connectivity Check',desc:'ICE agent performs connectivity checks: A sends STUN Binding Requests directly to B\'s candidate addresses. B does the same to A. Checking all candidate pairs.',state:{a:'checking',b:'checking'}},
  {from:3,to:0,type:'stun',label:'STUN Binding Response ✓',desc:'Connectivity check succeeds! Both peers can reach each other directly (P2P). ICE selects this as the nominated candidate pair.',state:{a:'connected',b:'connected'}},
  {from:0,to:3,type:'media',label:'DTLS Handshake + SRTP',desc:'DTLS handshake establishes encryption keys. Then SRTP (Secure Real-time Transport Protocol) carries encrypted audio/video directly peer-to-peer.',state:{a:'connected',b:'connected'}},
  {from:3,to:0,type:'media',label:'Media Stream ↔',desc:'Bidirectional encrypted media flows directly between peers. No server in the media path = low latency, high quality.',state:{a:'connected',b:'connected'}}
 ]
},
{name:'TURN Relay (Symmetric NAT)',
 entities:['Peer A','Signaling','TURN\nServer','Peer B'],
 entityClasses:['entity-peer-a','entity-signal','entity-turn','entity-peer-b'],
 steps:[
  {from:0,to:1,type:'sdp',label:'SDP Offer (via signaling)',desc:'Standard SDP offer/answer exchange. Same as P2P flow — TURN is only needed when direct connectivity fails.',state:{a:'have-local-offer',b:'new'}},
  {from:1,to:3,type:'sdp',label:'Forward Offer → Answer exchange',desc:'Complete SDP negotiation happens normally through signaling server.',state:{a:'stable',b:'stable'}},
  {from:0,to:2,type:'stun',label:'STUN Check (direct P2P)',desc:'A attempts direct connectivity check to B. Both peers are behind symmetric NATs that block incoming connections.',state:{a:'checking',b:'checking'}},
  {from:0,to:3,type:'fail',label:'Direct P2P FAILS',desc:'Symmetric NAT blocks the direct connection. The mapped port changes for each destination, making STUN-discovered addresses useless for direct P2P.',state:{a:'checking',b:'checking'}},
  {from:0,to:2,type:'turn',label:'TURN Allocate Request',desc:'Peer A requests a relay allocation from the TURN server. TURN creates a relay address (public IP:port) that will forward traffic.',state:{a:'checking',b:'checking'}},
  {from:2,to:0,type:'turn',label:'TURN Allocate Response',desc:'TURN server responds with a relay candidate (relay address). This address is reachable from the internet.',state:{a:'checking',b:'checking'}},
  {from:0,to:1,type:'ice',label:'ICE Candidate (relay)',desc:'A sends the relay candidate to B. This is the TURN-allocated address, not A\'s direct address.',state:{a:'checking',b:'checking'}},
  {from:1,to:3,type:'ice',label:'Forward relay candidate',desc:'B receives A\'s relay candidate.',state:{a:'checking',b:'checking'}},
  {from:3,to:2,type:'turn',label:'TURN Allocate (B side)',desc:'B also allocates a TURN relay, or connects to A\'s relay directly.',state:{a:'checking',b:'checking'}},
  {from:0,to:2,type:'stun',label:'Connectivity check (via TURN)',desc:'ICE connectivity check succeeds through TURN relay. The relay candidate pair is nominated.',state:{a:'connected',b:'connected'}},
  {from:0,to:2,type:'media',label:'Media → TURN relay',desc:'A sends encrypted media to the TURN server.',state:{a:'connected',b:'connected'}},
  {from:2,to:3,type:'media',label:'TURN relay → B',desc:'TURN server relays media to B. All media flows through the server — higher latency, but it works behind any NAT.',state:{a:'connected',b:'connected'}}
 ]
},
{name:'ICE Restart',
 entities:['Peer A','Signaling','STUN','Peer B'],
 entityClasses:['entity-peer-a','entity-signal','entity-stun','entity-peer-b'],
 steps:[
  {from:0,to:3,type:'media',label:'Active media session',desc:'Peers are connected and exchanging media. Connection is working normally.',state:{a:'connected',b:'connected'}},
  {from:0,to:0,type:'fail',label:'Network change (WiFi → LTE)',desc:'Peer A switches from WiFi to cellular. The old ICE candidate (WiFi IP) is no longer valid. Connection breaks.',state:{a:'disconnected',b:'disconnected'}},
  {from:0,to:0,type:'sdp',label:'createOffer({iceRestart: true})',desc:'Peer A creates a new offer with iceRestart:true. This generates new ICE credentials (ufrag/pwd) while keeping the same RTCPeerConnection.',state:{a:'have-local-offer',b:'stable'}},
  {from:0,to:1,type:'sdp',label:'Send new SDP Offer',desc:'New offer with fresh ICE credentials sent through signaling.',state:{a:'have-local-offer',b:'stable'}},
  {from:1,to:3,type:'sdp',label:'Forward new Offer',desc:'B receives the new offer. The new ICE ufrag/pwd signals an ICE restart.',state:{a:'have-local-offer',b:'have-remote-offer'}},
  {from:3,to:1,type:'sdp',label:'Send new Answer',desc:'B creates and sends a new answer. Both peers start fresh ICE gathering with new candidates.',state:{a:'have-local-offer',b:'stable'}},
  {from:1,to:0,type:'sdp',label:'Forward Answer',desc:'A receives the new answer.',state:{a:'stable',b:'stable'}},
  {from:0,to:2,type:'stun',label:'New STUN discovery (LTE)',desc:'A discovers new candidates on the cellular network. Different IP address than before.',state:{a:'checking',b:'checking'}},
  {from:0,to:1,type:'ice',label:'New ICE candidates',desc:'A sends new candidates from LTE network.',state:{a:'checking',b:'checking'}},
  {from:1,to:3,type:'ice',label:'Forward candidates',desc:'B receives A\'s new LTE candidates.',state:{a:'checking',b:'checking'}},
  {from:0,to:3,type:'stun',label:'Connectivity check ✓',desc:'New connectivity checks succeed with A\'s LTE address. Connection restored!',state:{a:'connected',b:'connected'}},
  {from:0,to:3,type:'media',label:'Media resumes',desc:'Media flows again on the new network path. Session preserved — no re-negotiation of codecs or streams needed.',state:{a:'connected',b:'connected'}}
 ]
},
{name:'Trickle ICE',
 entities:['Peer A','Signaling','STUN','Peer B'],
 entityClasses:['entity-peer-a','entity-signal','entity-stun','entity-peer-b'],
 steps:[
  {from:0,to:0,type:'sdp',label:'createOffer() + setLocalDescription()',desc:'ICE gathering starts immediately when setLocalDescription is called. Candidates are discovered asynchronously.',state:{a:'have-local-offer',b:'new'}},
  {from:0,to:1,type:'sdp',label:'Send Offer (no candidates yet)',desc:'SDP offer is sent immediately, before any ICE candidates are gathered. This is Trickle ICE — don\'t wait for all candidates.',state:{a:'have-local-offer',b:'new'}},
  {from:0,to:0,type:'ice',label:'onicecandidate: host (192.168.1.5)',desc:'First candidate discovered: local/host address. This is instant — no network request needed.',state:{a:'have-local-offer',b:'new'}},
  {from:0,to:1,type:'ice',label:'Trickle: host candidate',desc:'Host candidate sent immediately to B. B can start connectivity checks before all candidates arrive.',state:{a:'have-local-offer',b:'new'}},
  {from:0,to:2,type:'stun',label:'STUN request (parallel)',desc:'STUN request sent in parallel with signaling. Multiple STUN servers may be queried simultaneously.',state:{a:'have-local-offer',b:'new'}},
  {from:1,to:3,type:'sdp',label:'Forward Offer + host candidate',desc:'B receives offer and first candidate. B can set remote description and add the candidate immediately.',state:{a:'have-local-offer',b:'have-remote-offer'}},
  {from:2,to:0,type:'stun',label:'STUN response: srflx (203.0.113.1)',desc:'Server-reflexive candidate discovered. Takes ~50-200ms for STUN response.',state:{a:'have-local-offer',b:'have-remote-offer'}},
  {from:0,to:1,type:'ice',label:'Trickle: srflx candidate',desc:'Second candidate trickled to B. Connectivity checks with this candidate can start before TURN allocation completes.',state:{a:'have-local-offer',b:'have-remote-offer'}},
  {from:3,to:1,type:'sdp',label:'SDP Answer + B\'s candidates',desc:'B sends answer and its own candidates. The SDP exchange and ICE trickling happen in parallel.',state:{a:'stable',b:'stable'}},
  {from:0,to:0,type:'ice',label:'onicecandidate: null (gathering complete)',desc:'null candidate signals ICE gathering is complete. All candidate types discovered: host, srflx, (relay if TURN configured).',state:{a:'stable',b:'stable'}},
  {from:0,to:3,type:'stun',label:'Best pair selected ✓',desc:'ICE agent tested all candidate pairs and selected the best one. Host↔Host pairs are tried first (lowest latency).',state:{a:'connected',b:'connected'}}
 ]
},
{name:'Data Channel (No Media)',
 entities:['Peer A','Signaling','STUN','Peer B'],
 entityClasses:['entity-peer-a','entity-signal','entity-stun','entity-peer-b'],
 steps:[
  {from:0,to:0,type:'sdp',label:'createDataChannel("chat")',desc:'Peer A creates an RTCDataChannel before the offer. Data channels use SCTP over DTLS — no media codecs needed.',state:{a:'new',b:'new'}},
  {from:0,to:0,type:'sdp',label:'createOffer() — SDP has m=application',desc:'The SDP offer contains m=application (SCTP/DTLS) instead of m=audio/m=video. Data channels have their own SDP media section.',state:{a:'have-local-offer',b:'new'}},
  {from:0,to:1,type:'sdp',label:'Send Offer',desc:'Offer sent through signaling. The SDP describes SCTP parameters: max message size, number of streams.',state:{a:'have-local-offer',b:'new'}},
  {from:1,to:3,type:'sdp',label:'Forward Offer',desc:'B receives the offer.',state:{a:'have-local-offer',b:'have-remote-offer'}},
  {from:3,to:3,type:'sdp',label:'ondatachannel event',desc:'B gets an ondatachannel event with the "chat" channel. B can also create additional data channels on the same connection.',state:{a:'have-local-offer',b:'have-remote-offer'}},
  {from:3,to:1,type:'sdp',label:'Send Answer',desc:'B sends SDP answer accepting the SCTP/DTLS data channel.',state:{a:'stable',b:'stable'}},
  {from:1,to:0,type:'sdp',label:'Forward Answer',desc:'Complete SDP exchange.',state:{a:'stable',b:'stable'}},
  {from:0,to:2,type:'stun',label:'ICE + STUN (same as media)',desc:'ICE/STUN process is identical to media connections. Data channels use the same ICE/DTLS transport.',state:{a:'checking',b:'checking'}},
  {from:0,to:3,type:'stun',label:'Connectivity check ✓',desc:'P2P connection established.',state:{a:'connected',b:'connected'}},
  {from:0,to:3,type:'media',label:'DTLS handshake → SCTP',desc:'DTLS establishes encryption. SCTP provides ordered/unordered, reliable/unreliable delivery options.',state:{a:'connected',b:'connected'}},
  {from:0,to:3,type:'media',label:'dc.send("Hello!")',desc:'Data flows over SCTP. Supports strings and binary (ArrayBuffer/Blob). Max message size typically 256KB (fragmentation for larger).',state:{a:'connected',b:'connected'}}
 ]
}
];

let currentScenario=0,currentStep=-1,autoInterval=null,currentTab='detail';

function init(){
  const sel=document.getElementById('scenarioSelect');
  SCENARIOS.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=s.name;sel.appendChild(o)});
  sel.onchange=()=>{currentScenario=+sel.value;reset()};
  render();
}

function render(){
  const s=SCENARIOS[currentScenario];
  const col=document.getElementById('seqCol');
  const entW=140,gap=(700-entW*s.entities.length)/(s.entities.length-1);
  const totalW=s.entities.length*entW+(s.entities.length-1)*gap;

  let html=`<div class="seq-diagram" style="width:${Math.max(totalW+40,700)}px">`;
  html+=`<div class="seq-entities">`;
  s.entities.forEach((e,i)=>{
    html+=`<div class="entity" style="width:${entW}px"><div class="entity-box ${s.entityClasses[i]}">${e.replace('\n','<br>')}</div></div>`;
  });
  html+=`</div>`;

  // Lifelines
  s.entities.forEach((_,i)=>{
    const x=20+i*(entW+gap)+entW/2;
    html+=`<div class="lifeline" style="left:${x}px;height:${s.steps.length*48+20}px"></div>`;
  });

  html+=`<div class="seq-steps">`;
  s.steps.forEach((step,idx)=>{
    const cls=idx<currentStep?'past':idx===currentStep?'active':'';
    const fromX=20+step.from*(entW+gap)+entW/2;
    const toX=20+step.to*(entW+gap)+entW/2;
    const left=Math.min(fromX,toX);
    const width=Math.abs(toX-fromX);
    const isRight=toX>fromX;
    const isSelf=step.from===step.to;

    html+=`<div class="seq-step ${cls}">`;
    if(isSelf){
      html+=`<div style="position:absolute;left:${fromX+4}px;top:14px;font-size:.72rem;font-weight:600;padding:2px 6px;border-radius:4px;white-space:nowrap" class="arrow-label" style="color:${getColor(step.type)}">${esc(step.label)}</div>`;
    }else{
      html+=`<div class="arrow arrow-${step.type} ${isRight?'arrow-right':'arrow-left'}" style="left:${left}px;width:${width}px;top:22px">`;
      html+=`<div class="arrow-line">`;
      html+=`<div class="arrow-head" style="${isRight?'right:-1px':'left:-1px'}"></div>`;
      html+=`</div>`;
      html+=`<div class="arrow-label" style="left:${width/2-40}px">${esc(step.label)}</div>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  html+=`</div></div>`;
  col.innerHTML=html;
  renderTab();
}

function getColor(type){
  const m={sdp:'#ffd43b',ice:'#69db7c',stun:'#4dabf7',media:'#cc5de8',turn:'#ff6b6b',fail:'#ff4444'};
  return m[type]||'#888';
}

function renderTab(){
  const s=SCENARIOS[currentScenario];
  const step=s.steps[currentStep];
  const el=document.getElementById('tabContent');

  if(currentTab==='detail'){
    let html='';
    if(step){
      html+=`<div class="info-card"><h4>${esc(step.label)}</h4><p>${esc(step.desc)}</p></div>`;
      if(step.state){
        html+=`<div class="info-card"><h4>Connection States</h4>`;
        html+=`<p>Peer A: <span class="state-badge st-${step.state.a==='stable'||step.state.a==='connected'?'connected':step.state.a==='disconnected'||step.state.a==='failed'?'failed':step.state.a.includes('offer')||step.state.a.includes('checking')?'connecting':'new'}">${step.state.a}</span></p>`;
        html+=`<p style="margin-top:4px">Peer B: <span class="state-badge st-${step.state.b==='stable'||step.state.b==='connected'?'connected':step.state.b==='disconnected'||step.state.b==='failed'?'failed':step.state.b.includes('offer')||step.state.b.includes('checking')?'connecting':'new'}">${step.state.b}</span></p>`;
        html+=`</div>`;
      }
    }else{
      html+=`<div class="info-card"><h4>WebRTC Signaling</h4><p>Step through the signaling flow to see how WebRTC establishes peer-to-peer connections. Each arrow represents a message in the signaling sequence.</p></div>`;
    }
    // Progress
    html+=`<div class="info-card"><h4>Progress</h4><p>Step ${currentStep+1} / ${s.steps.length}</p></div>`;
    el.innerHTML=html;

  }else if(currentTab==='sdp'){
    let html=`<div class="info-card"><h4>SDP Example</h4></div>`;
    html+=`<div class="sdp-block">v=0
o=- 4611731400430051726 2 IN IP4 127.0.0.1
s=-
t=0 0
a=group:BUNDLE 0
a=extmap-allow-mixed
a=msid-semantic: WMS
m=audio 9 UDP/TLS/RTP/SAVPF 111 103 104
c=IN IP4 0.0.0.0
a=rtcp:9 IN IP4 0.0.0.0
a=ice-ufrag:sn0w
a=ice-pwd:aEM45HKLOasdfJKL...
a=ice-options:trickle
a=fingerprint:sha-256 AB:CD:EF:...
a=setup:actpass
a=mid:0
a=sendrecv
a=rtcp-mux
a=rtpmap:111 opus/48000/2
a=fmtp:111 minptime=10;useinbandfec=1</div>`;
    html+=`<div class="info-card" style="margin-top:8px"><h4>SDP Key Fields</h4>
    <table class="ref-table">
    <tr><td><code>ice-ufrag</code></td><td>ICE username fragment (unique per session)</td></tr>
    <tr><td><code>ice-pwd</code></td><td>ICE password for STUN authentication</td></tr>
    <tr><td><code>fingerprint</code></td><td>DTLS certificate fingerprint for SRTP key derivation</td></tr>
    <tr><td><code>setup</code></td><td>DTLS role: actpass (offerer), active/passive (answerer)</td></tr>
    <tr><td><code>rtpmap</code></td><td>Codec mapping (e.g., 111 = Opus audio)</td></tr>
    <tr><td><code>a=sendrecv</code></td><td>Direction: send+receive, sendonly, recvonly, inactive</td></tr>
    </table></div>`;
    el.innerHTML=html;

  }else{
    el.innerHTML=`
    <div class="info-card"><h4>ICE Candidate Types</h4>
    <table class="ref-table">
    <tr><th>Type</th><th>Source</th><th>Priority</th></tr>
    <tr><td>host</td><td>Local network interface</td><td>Highest</td></tr>
    <tr><td>srflx</td><td>STUN server (public IP)</td><td>Medium</td></tr>
    <tr><td>prflx</td><td>Peer connectivity check</td><td>Medium</td></tr>
    <tr><td>relay</td><td>TURN server allocation</td><td>Lowest</td></tr>
    </table></div>
    <div class="info-card"><h4>Connection States</h4>
    <table class="ref-table">
    <tr><th>State</th><th>Meaning</th></tr>
    <tr><td>new</td><td>Initial state, no networking</td></tr>
    <tr><td>checking</td><td>ICE connectivity checks in progress</td></tr>
    <tr><td>connected</td><td>At least one working candidate pair</td></tr>
    <tr><td>completed</td><td>All checks done, best pair selected</td></tr>
    <tr><td>disconnected</td><td>Connectivity lost (may recover)</td></tr>
    <tr><td>failed</td><td>All checks failed, no connectivity</td></tr>
    <tr><td>closed</td><td>Connection shut down</td></tr>
    </table></div>
    <div class="info-card"><h4>Protocols</h4>
    <table class="ref-table">
    <tr><th>Protocol</th><th>Role</th></tr>
    <tr><td>SDP</td><td>Describes media capabilities + ICE params</td></tr>
    <tr><td>ICE</td><td>NAT traversal + connectivity checking</td></tr>
    <tr><td>STUN</td><td>Discover public IP (server-reflexive)</td></tr>
    <tr><td>TURN</td><td>Relay traffic when P2P fails</td></tr>
    <tr><td>DTLS</td><td>Key exchange for encryption</td></tr>
    <tr><td>SRTP</td><td>Encrypted media transport</td></tr>
    <tr><td>SCTP</td><td>Data channel transport (over DTLS)</td></tr>
    </table></div>
    <div class="info-card"><h4>NAT Types</h4>
    <table class="ref-table">
    <tr><th>Type</th><th>P2P?</th></tr>
    <tr><td>Full Cone</td><td>Easy — any external host can send</td></tr>
    <tr><td>Restricted Cone</td><td>OK — must send first to allow incoming</td></tr>
    <tr><td>Port Restricted</td><td>Harder — port must also match</td></tr>
    <tr><td>Symmetric</td><td>Requires TURN relay</td></tr>
    </table></div>`;
  }
}

function stepForward(){
  const s=SCENARIOS[currentScenario];
  if(currentStep<s.steps.length-1){currentStep++;render()}
}
function stepBack(){if(currentStep>=0){currentStep--;render()}}
function reset(){
  if(autoInterval){clearInterval(autoInterval);autoInterval=null}
  currentStep=-1;render();
}
function autoPlay(){
  if(autoInterval){clearInterval(autoInterval);autoInterval=null;return}
  autoInterval=setInterval(()=>{
    const s=SCENARIOS[currentScenario];
    if(currentStep>=s.steps.length-1){clearInterval(autoInterval);autoInterval=null;return}
    stepForward();
  },1200);
}
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab-bar button').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().startsWith(t.slice(0,3))));
  renderTab();
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
init();
</script>
